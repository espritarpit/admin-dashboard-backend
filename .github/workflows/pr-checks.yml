name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  pr-checks:
    name: PR Checks
    runs-on: self-hosted

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        run: |
          export NVM_DIR="$HOME/.nvm"

          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            echo "Installing NVM"
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          fi

          . "$NVM_DIR/nvm.sh"

          nvm install 20
          nvm use 20

          node -v
          npm -v

      - name: Install dependencies
        run: |
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          nvm use 20

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run ESLint
        run: |
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          nvm use 20
          npm run lint

      - name: Build app
        run: |
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          nvm use 20
          npm run build
